<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strona Wojtka</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <h1>Strona Wojtka K.</h1>
  </header>

  <main>
    <section class="o-mnie">
      <h2>O mnie</h2>
      <p>Tu wpisz kilka zdań o sobie: co lubisz robić, jakie masz hobby, co Cię interesuje.</p>
    </section>

    <section class="obrazek">
      <img src="img/logo.png" alt="Moje zdjęcie lub logo">
    </section>

    <section class="licznik">
      <p>Kliknięć: <span id="licznik">0</span></p>
      <button id="przycisk">Kliknij mnie!</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
